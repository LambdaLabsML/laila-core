site_name: LAILA
site_description: Lambda's Interdisciplinary Large Atlas — unified data and compute workflows
repo_url: https://github.com/LambdaLabsML/laila-core
repo_name: LambdaLabsML/laila-core

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search
  - gen-files:
      scripts:
        - docs/gen_ref_pages.py
  - literate-nav:
      nav_file: SUMMARY.md
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: numpy
            show_source: true
            heading_level: 2
            show_root_heading: true
            show_root_full_path: true
            members_order: source

nav:
  - Home: index.md
  - Tutorials:
    - 1. Entries and Identity: tutorials/01_entries_and_identity.md
    - 2. Local Pools: tutorials/02_local_pools.md
    - 3. S3 with Tensors: tutorials/03_s3_tensors.md
    - 4. Model Checkpoint: tutorials/04_model_checkpoint.md
  - API Reference: reference/

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - toc:
      permalink: true
  - tables
