version: 2
updates:
  # Python runtime + dev/test dependencies. Everything is rolled into a single
  # grouped PR per run so reviewers (and the auto-merge workflow) deal with one
  # PR instead of several. Cadence is monthly to keep churn low.
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: monthly
      day: monday
      time: "09:00"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - python
    groups:
      python:
        applies-to: version-updates
        patterns:
          - "*"
      python-security:
        applies-to: security-updates
        patterns:
          - "*"

  # GitHub Actions: one grouped PR per run, monthly.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
      day: monday
    labels:
      - dependencies
      - github-actions
    open-pull-requests-limit: 5
    groups:
      actions:
        applies-to: version-updates
        patterns:
          - "*"
      actions-security:
        applies-to: security-updates
        patterns:
          - "*"
