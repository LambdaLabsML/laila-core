name: Bug report
description: Report a reproducible bug in laila-core
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug! Please fill in as much of
        this template as you can — concrete reproductions get triaged
        fastest.

        **Security issues should NOT be filed here.** Follow `SECURITY.md`.

  - type: input
    id: version
    attributes:
      label: laila-core version
      description: Output of `python -c "import laila; print(laila.__version__)"`
      placeholder: "1.0.6"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.12.3"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "Ubuntu 24.04 / macOS 14.4 / Windows 11 WSL2"
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the unexpected behavior.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: A self-contained snippet (or repo link) that reproduces the issue.
      render: python
    validations:
      required: true

  - type: textarea
    id: traceback
    attributes:
      label: Traceback / logs
      render: shell

  - type: dropdown
    id: backend
    attributes:
      label: Which backend(s) are involved?
      multiple: true
      options:
        - filesystem
        - S3 / Cloudflare R2 / Backblaze B2
        - GCS
        - Azure Blob
        - Redis
        - Postgres
        - MongoDB
        - HDF5
        - DuckDB
        - HuggingFace Hub
        - SQLite
        - None / not backend-related
